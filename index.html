<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Back to School 2026 — Command</title>
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#0B1220">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Back to School">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%23002F6C'/%3E%3Ctext x='90' y='125' font-family='Georgia,serif' font-size='110' font-weight='bold' text-anchor='middle' fill='%23C49A2E'%3EE%3C/text%3E%3C/svg%3E">
<style>
  :root{
    --bg:#0B1220; --card:#131C2E; --card2:#0F1726; --line:#243149;
    --navy:#2C5AA6; --gold:#C79A3B; --text:#EAEFF8; --mut:#8B96AD;
    --done:#35C08A; --warn:#E0A845; --hot:#E5675C;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased}
  .wrap{max-width:820px;margin:0 auto;padding:0 14px 90px}
  header{background:var(--bg);padding:16px 14px 8px;max-width:820px;margin:0 auto}
  .brand{display:flex;align-items:center;gap:10px}
  .mark{width:34px;height:34px;border-radius:9px;background:#002F6C;display:grid;place-items:center;
    font-family:Georgia,serif;font-weight:700;color:var(--gold);font-size:20px;flex:none}
  .brand h1{font-size:17px;margin:0;letter-spacing:.3px}
  .brand p{margin:1px 0 0;font-size:11.5px;color:var(--mut)}
  .count{margin:12px 0 4px;background:linear-gradient(120deg,#12234a,#0f1a30);border:1px solid var(--line);
    border-radius:14px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between}
  .count .big{font-size:26px;font-weight:800;color:var(--gold);line-height:1}
  .count .sub{font-size:12px;color:var(--mut);margin-top:3px}
  .count .day{text-align:right;font-size:12px;color:var(--text)}
  .count .day b{display:block;font-size:15px}
  .pbar{height:7px;border-radius:6px;background:var(--card2);border:1px solid var(--line);margin:10px 0 2px;overflow:hidden}
  .pbar i{display:block;height:100%;background:linear-gradient(90deg,var(--navy),var(--gold));width:0}
  .pnote{font-size:11px;color:var(--mut);margin:0 2px}
  nav{position:sticky;top:0;z-index:19;display:flex;gap:6px;background:var(--bg);
    padding:10px 14px;max-width:820px;margin:0 auto;overflow-x:auto;border-bottom:1px solid var(--line)}
  .tabbtn{flex:none;border:1px solid var(--line);background:var(--card2);color:var(--mut);
    padding:8px 14px;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer}
  .tabbtn.on{background:var(--gold);color:#20170a;border-color:var(--gold)}
  .tab{display:none} .tab.on{display:block}
  .sec{font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--mut);margin:16px 4px 8px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 14px;margin-bottom:9px}
  .row{display:flex;align-items:flex-start;gap:10px}
  .row .t{flex:1;min-width:0}
  .row h3{margin:0;font-size:15px;font-weight:650}
  .row p{margin:3px 0 0;font-size:12.5px;color:var(--mut);line-height:1.45}
  .chip{flex:none;font-size:10.5px;font-weight:700;padding:4px 9px;border-radius:999px;letter-spacing:.4px;
    text-transform:uppercase;white-space:nowrap}
  .done{background:rgba(53,192,138,.14);color:var(--done)}
  .warn{background:rgba(224,168,69,.15);color:var(--warn)}
  .hot{background:rgba(229,103,92,.16);color:var(--hot)}
  .wait{background:rgba(44,90,166,.2);color:#7FA6E6}
  .num{width:26px;height:26px;border-radius:8px;background:var(--card2);border:1px solid var(--line);
    display:grid;place-items:center;font-size:12px;font-weight:700;color:var(--gold);flex:none;margin-top:1px}
  .wk{border-left:3px solid var(--navy)}
  .wkhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;gap:8px}
  .wkhead .w{font-size:11px;color:var(--gold);font-weight:700;letter-spacing:.6px}
  .wkhead h3{margin:2px 0 0;font-size:15px}
  .wkhead .dates{font-size:11px;color:var(--mut);text-align:right;white-space:nowrap}
  .mini{height:5px;border-radius:5px;background:var(--card2);overflow:hidden;margin:2px 0 6px}
  .mini i{display:block;height:100%;background:var(--done);width:0}
  .item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-top:1px solid var(--line);cursor:pointer}
  .item .box{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--line);background:var(--card2);
    flex:none;display:grid;place-items:center;margin-top:1px;font-size:12px;color:var(--done)}
  .item.ck .box{background:rgba(53,192,138,.16);border-color:var(--done)}
  .item .d{flex:1;font-size:13.5px;line-height:1.35}
  .item.ck .d{color:var(--mut);text-decoration:line-through}
  .item .d span{display:block;font-size:11.5px;color:var(--mut);margin-top:2px;text-decoration:none}
  .stat{display:flex;gap:9px;margin:2px 0 6px}
  .stat .b{flex:1;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px;text-align:center}
  .stat .b b{display:block;font-size:22px;color:var(--gold)}
  .stat .b span{font-size:10.5px;color:var(--mut)}
  .lk{display:block;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;
    margin-bottom:9px;color:var(--text);text-decoration:none;font-size:13.5px;font-weight:600}
  .lk span{display:block;font-size:11.5px;color:var(--mut);font-weight:400;margin-top:2px}
  .foot{text-align:center;color:var(--mut);font-size:11px;margin-top:18px;line-height:1.6}
</style>
</head>
<body>
<header>
  <div class="brand">
    <div class="mark">E</div>
    <div><h1>Back to School 2026 — Command</h1><p>Emma · Program control room · NAACP Detroit Branch</p></div>
  </div>
  <div class="count">
    <div><div class="big" id="cd">—</div><div class="sub">Sat, Aug 29 · Delores Bennett Park · 12–3</div></div>
    <div class="day"><b>500 bags</b><span>300 EM · 200 HS</span></div>
  </div>
  <div class="pbar"><i id="pbar"></i></div>
  <div class="pnote" id="pnote">—</div>
</header>

<nav>
  <button class="tabbtn on" data-tab="do">Do Now</button>
  <button class="tabbtn" data-tab="tl">Timeline</button>
  <button class="tabbtn" data-tab="st">Status</button>
  <button class="tabbtn" data-tab="nt">Notes</button>
</nav>

<div class="wrap">
  <section id="do" class="tab on"></section>
  <section id="tl" class="tab"></section>
  <section id="st" class="tab"></section>
  <section id="nt" class="tab"></section>
</div>

<script>
var esc=function(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');};

// ---- DATA: 13 workstreams. status chip: hot / warn / wait / done ----
var WS=[
 {n:1,title:"Sponsors & Fundraising",owner:"Jermaine · LaToya Henry",chip:"hot",chipText:"Critical",due:"Aug 1",
  items:[
   {t:"Finalize the ask and tiers ($250 / $500 / $1,000)",who:"by Jul 8"},
   {t:"Build the sponsor target list (DTE, Kroger, Huntington, First Independence, MGM food)",who:"by Jul 8"},
   {t:"Stand up the Stripe link and donation QR",who:"by Jul 15"},
   {t:"Lock sponsor logos for the flyer",who:"by Jul 20"},
   {t:"Send the donation letter",who:"by Aug 1"}]},
 {n:2,title:"Backpacks & Kits",owner:"Jermaine",chip:"hot",chipText:"Order now",due:"Jul 18",
  items:[
   {t:"Pick the bag and kit mix in the Builder",who:"by Jul 11"},
   {t:"Confirm Bags in Bulk prices (7860SS, 7864SS) + price-check Backpacks USA",who:"by Jul 14"},
   {t:"Get director sign-off on the number",who:"by Jul 16"},
   {t:"Place the order (before peak-season stock-outs)",who:"by Jul 18"}]},
 {n:3,title:"Budget",owner:"Jermaine · Kathleen Coney",chip:"wait",chipText:"To build",due:"Aug 1",
  items:[
   {t:"Build the 2026 one-pager in the standard format",who:"by Jul 25"},
   {t:"Enter vendor quotes with confirmed and paid tracking",who:"ongoing"},
   {t:"Lock the Grand Total and get ED sign-off",who:"by Aug 1"}]},
 {n:4,title:"Vendors & Rentals",owner:"LaToya Elliott · Jermaine",chip:"warn",chipText:"In progress",due:"Aug 1",
  items:[
   {t:"Stage secured and paid (Oakland County Parks)",who:"done",done:true},
   {t:"Sit down on setup and items (Event Suppliers, Quote 68159129)",who:"by Jul 15"},
   {t:"Confirm and pay tents, chairs, tables (about $2,321)",who:"by Aug 1"},
   {t:"Book sanitation (Turner, about $450)",who:"by Aug 1"},
   {t:"Bike racks, generator, U-Haul",who:"by Aug 8"}]},
 {n:5,title:"Permit & Insurance",owner:"LaToya Elliott",chip:"hot",chipText:"Action",due:"Aug 12",
  items:[
   {t:"Insurance certificate adding City of Detroit as co-insurer (address in the 6/30 email)",who:"by Jul 15"},
   {t:"Re-file the City of Detroit park permit (about $415)",who:"by Jul 25"},
   {t:"Collect vendor insurance certificates",who:"by Aug 12"}]},
 {n:6,title:"Food",owner:"Star Edison",chip:"wait",chipText:"Not started",due:"Aug 12",
  items:[
   {t:"Confirm the menu and quantities from 2025 (560 hot dogs, 150 burgers, 48 cases water)",who:"by Aug 1"},
   {t:"Price and source (Sam's Club, Costco Proshop)",who:"by Aug 5"},
   {t:"Food safety setup (temp logs, wash station)",who:"by Aug 12"},
   {t:"Assign a food-line lead and start the grill early",who:"by Aug 12"}]},
 {n:7,title:"Games & Entertainment",owner:"Jermaine · LaToya Elliott",chip:"warn",chipText:"Reply due",due:"Aug 12",
  items:[
   {t:"Review the Coloring Museum proposal and reply to Tierra Jones",who:"by Jul 11"},
   {t:"Re-book DJ, Smiley the Clown, game truck (Bryant George)",who:"by Aug 1"},
   {t:"Confirm the bounce house and assign a supervisor",who:"by Aug 8"},
   {t:"Plan the youth activity stations",who:"by Aug 12"}]},
 {n:8,title:"Registration",owner:"Je'Tina Thomas · Kathleen Coney",chip:"wait",chipText:"Not started",due:"Aug 28",
  items:[
   {t:"Stand up QR pre-registration",who:"by Jul 20"},
   {t:"Order wristbands (color by tier) and numbered food tickets",who:"by Aug 1"},
   {t:"Full reg crew plus tablet check-in (no solo desk)",who:"by Aug 12"},
   {t:"Print pre-registration binders A to Z",who:"by Aug 26"}]},
 {n:9,title:"Promo & Flyer",owner:"LaToya Henry · LaToya Elliott",chip:"warn",chipText:"In progress",due:"Aug 28",
  items:[
   {t:"Finalize the flyer (Elliott copy, Henry design)",who:"by Jul 18"},
   {t:"Add sponsor logos once locked",who:"by Jul 22"},
   {t:"Publish and run the street team",who:"by Aug 1"},
   {t:"Audience emails: vendors, parents, staff",who:"by Aug 26"}]},
 {n:10,title:"Partners & Resource Tables",owner:"LaToya Elliott · Jermaine",chip:"warn",chipText:"In progress",due:"Aug 1",
  items:[
   {t:"NEYIC Adopt-A-Child (Mary Bennett) — on the flyer",who:"done",done:true},
   {t:"DOL work-rights (Mildred Kress) — confirmed Jul 8",who:"done",done:true},
   {t:"Re-confirm BFD (Daralynn Walker): registration crew + supplies",who:"by Jul 25"},
   {t:"Re-confirm DTE, Mobile Library, DPSCD, First Independence",who:"by Aug 1"},
   {t:"Health-org tables",who:"by Aug 8"}]},
 {n:11,title:"Volunteers & Bag Stuffing",owner:"Jermaine",chip:"warn",chipText:"In progress",due:"Aug 12",
  items:[
   {t:"BRIDGES youth roster set at 15 (via Gwendolyn, connectdetroit)",who:"done",done:true},
   {t:"Schedule the 2026 bag-stuffing day (2025 was Aug 20, two shifts)",who:"by Aug 1"},
   {t:"Recruit about 22 day-of volunteers (BRIDGES, Co-Ette, BFD)",who:"by Aug 12"},
   {t:"Assign the five failure points: water, food line, bounce supervisor, reg depth, vendor backup",who:"by Aug 12"}]},
 {n:12,title:"Layout & Run of Show",owner:"Jermaine · LaToya Elliott",chip:"wait",chipText:"To build",due:"Aug 28",
  items:[
   {t:"Update the 2026 site map (PowerPoint, PDF, legend)",who:"by Aug 8"},
   {t:"Roll the 2025 run of show forward with owners",who:"by Aug 18"},
   {t:"Confirm the Flip Kit choreography (food to backpack)",who:"by Aug 22"},
   {t:"Build the print and gear pull list",who:"by Aug 26"}]},
 {n:13,title:"Post-Event",owner:"Jermaine · LaToya Henry",chip:"wait",chipText:"After",due:"Sep 26",
  items:[
   {t:"Reconcile receipts (receipt-log style)",who:"by Sep 5"},
   {t:"Thank-you notes (donors, partners, volunteers)",who:"by Sep 5"},
   {t:"Post-event summary with the numbers",who:"by Sep 26"}]}
];

// milestones for the timeline
var TL=[
 {w:"By Jul 18",title:"Order the backpacks",note:"Longest-lead item goes first.",ws:[2]},
 {w:"By Aug 1",title:"Lock budget, vendors, sponsors, partners",note:"The money and the bookings.",ws:[1,3,4,10]},
 {w:"By Aug 12",title:"Ops and compliance",note:"Permit, insurance, food, activities, volunteers.",ws:[5,6,7,11]},
 {w:"By Aug 28",title:"Final week: promo and confirmations",note:"Flyer out, registration live, layout final.",ws:[8,9,12]},
 {w:"Aug 29",title:"Event day",note:"Delores Bennett Park, 12 to 3.",ws:[]},
 {w:"By Sep 26",title:"Reconcile and debrief",note:"Close the books, thank-yous, the numbers.",ws:[13]}
];

var LS=window.localStorage;
function key(n,i){return "b2s26_"+n+"_"+i;}
function isDone(n,i,def){var v=LS.getItem(key(n,i));return v===null?!!def:v==="1";}
function setDone(n,i,val){LS.setItem(key(n,i),val?"1":"0");}

function counts(){var d=0,t=0;WS.forEach(function(w){w.items.forEach(function(it,i){t++;if(isDone(w.n,i,it.done))d++;});});return{d:d,t:t};}
function wsDone(w){var d=0;w.items.forEach(function(it,i){if(isDone(w.n,i,it.done))d++;});return d;}

function itemRow(w,it,i){
  var ck=isDone(w.n,i,it.done);
  return '<div class="item'+(ck?' ck':'')+'" data-n="'+w.n+'" data-i="'+i+'">'+
    '<div class="box">'+(ck?'✓':'')+'</div>'+
    '<div class="d">'+esc(it.t)+'<span>'+esc(it.who)+'</span></div></div>';
}
function wsCard(w){
  var done=wsDone(w),tot=w.items.length,pct=Math.round(done/tot*100);
  return '<div class="card wk"><div class="wkhead"><div><div class="w">#'+w.n+' · '+esc(w.owner)+
    '</div><h3>'+esc(w.title)+'</h3></div>'+
    '<span class="chip '+w.chip+'">'+esc(w.chipText)+'</span></div>'+
    '<div class="mini"><i style="width:'+pct+'%"></i></div>'+
    '<div style="font-size:11px;color:var(--mut);margin-bottom:2px">'+done+' of '+tot+' done · due '+esc(w.due)+'</div>'+
    w.items.map(function(it,i){return itemRow(w,it,i);}).join('')+'</div>';
}

function render(){
  // progress
  var c=counts(),pct=Math.round(c.d/c.t*100);
  document.getElementById('pbar').style.width=pct+'%';
  document.getElementById('pnote').textContent=c.d+' of '+c.t+' tasks done ('+pct+'%). Tap any item to check it off. It saves on your phone.';

  // Do Now: open items due by Jul 18, plus the two hot workstreams
  var doHtml='<div class="sec">This week — knock these out first</div>';
  var soon=[];
  WS.forEach(function(w){w.items.forEach(function(it,i){
    if(isDone(w.n,i,it.done))return;
    var by=it.who; if(/Jul 8|Jul 11|Jul 14|Jul 15|Jul 16|Jul 18|Jul 20|Jul 22/.test(by)) soon.push({w:w,it:it,i:i});
  });});
  soon.forEach(function(s){ doHtml+='<div class="card"><div class="row"><div class="num">'+s.w.n+'</div>'+
    '<div class="t"><h3>'+esc(s.it.t)+'</h3><p>'+esc(s.w.title)+' · '+esc(s.w.owner)+'</p></div>'+
    '<span class="chip '+s.w.chip+'">'+esc(s.it.who)+'</span></div></div>'; });
  doHtml+='<div class="sec">The gaps we are still filling</div>'+
    '<div class="card"><div class="row"><div class="t"><p>These are open on purpose — we work them off, we do not guess. Dollars raised vs the $13,500 goal (#1) · the backpack number (#2) · permit and insurance (#5) · partners beyond NEYIC and DOL (#10).</p></div></div></div>';
  document.getElementById('do').innerHTML=doHtml;

  // Timeline
  var tlHtml='';
  TL.forEach(function(m){
    var chips=m.ws.map(function(n){var w=WS[n-1];return '<span class="chip '+w.chip+'" style="margin:3px 4px 0 0;display:inline-block">#'+n+' '+esc(w.title)+'</span>';}).join('');
    tlHtml+='<div class="card wk"><div class="wkhead"><div><div class="w">'+esc(m.w)+'</div><h3>'+esc(m.title)+'</h3></div></div>'+
      '<p style="margin:0 0 6px;font-size:12.5px;color:var(--mut)">'+esc(m.note)+'</p>'+chips+'</div>';
  });
  document.getElementById('tl').innerHTML=tlHtml;

  // Status
  var st='<div class="stat"><div class="b"><b>'+c.d+'/'+c.t+'</b><span>tasks done</span></div>'+
    '<div class="b"><b id="cd2">—</b><span>days to go</span></div>'+
    '<div class="b"><b>13</b><span>workstreams</span></div></div>';
  st+=WS.map(wsCard).join('');
  document.getElementById('st').innerHTML=st;

  // Notes
  document.getElementById('nt').innerHTML=
   '<div class="sec">The event</div>'+
   '<div class="card"><div class="t"><h3>Back to School, Stay in School — Family Fun Day</h3>'+
   '<p>Saturday, August 29, 2026. Delores Bennett Park, 444 Smith St, Detroit. Noon to 3, setup at 8. Free backpacks and supplies, food, games, resource tables for children 6 to 18. Target 500 backpacks and 600 to 700 people.</p></div></div>'+
   '<div class="sec">The five that break every year</div>'+
   '<div class="card"><div class="t"><p>Water with no owner. The food line. The bounce house with no supervisor. Registration run too thin. Late vendor drop-outs. Owners get assigned early in #11 and #6.</p></div></div>'+
   '<div class="sec">Open the deeper tools</div>'+
   '<a class="lk" href="https://github.com/Pathworth/naacp-back-to-school-2026/issues" target="_blank">GitHub issues board<span>The same 13 workstreams, with comments and history</span></a>'+
   '<a class="lk" href="https://github.com/Pathworth/naacp-back-to-school-2026/milestones" target="_blank">Milestones<span>Every due date on a calendar</span></a>'+
   '<div class="foot">Kept by Emma · reviewed Jul 1, 2026 · checks save to this phone<br>Inbox checked · no new movement since last pass</div>';
  var cd2=document.getElementById('cd2'); if(cd2){var d=daysTo();cd2.textContent=d;}
}

function daysTo(){
  var ev=new Date(2026,7,29); // Aug 29 2026
  var now=new Date(); now.setHours(0,0,0,0);
  return Math.max(0,Math.round((ev-now)/86400000));
}
function tick(){document.getElementById('cd').textContent=daysTo()+' days';}

document.addEventListener('click',function(e){
  var b=e.target.closest('.tabbtn');
  if(b){document.querySelectorAll('.tabbtn').forEach(function(x){x.classList.remove('on');});
    document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('on');});
    b.classList.add('on');document.getElementById(b.dataset.tab).classList.add('on');window.scrollTo(0,0);return;}
  var it=e.target.closest('.item');
  if(it){var n=+it.dataset.n,i=+it.dataset.i;var w=WS[n-1];var cur=isDone(n,i,w.items[i].done);
    setDone(n,i,!cur);render();}
});

tick(); render(); setInterval(tick,3600000);
</script>
</body>
</html>
